<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Wave — Video Calls</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05080f;
    --surface: #0c1018;
    --surface2: #131820;
    --border: #1c2333;
    --accent: #4f8eff;
    --accent-glow: rgba(79,142,255,0.15);
    --green: #22d98a;
    --red: #ff4f6a;
    --text: #dde4f0;
    --muted: #4a5568;
  }

/* ── HARD OVERFLOW LOCK ── */
html {
overflow: hidden;
width: 100%;
height: 100%;
position: fixed; /* prevents iOS rubber-band horizontal scroll */
}
body {
overflow-x: hidden;
overflow-y: auto;
width: 100%;
height: 100%;
position: fixed;
left: 0; top: 0; right: 0; bottom: 0;
-webkit-overflow-scrolling: touch;
overscroll-behavior: none; /* kills swipe-to-slide on supported browsers */
touch-action: pan-y;       /* allow vertical scroll only */
background: var(–bg);
color: var(–text);
font-family: ‘Cabinet Grotesk’, sans-serif;
}

*, *::before, *::after {
margin: 0; padding: 0;
box-sizing: border-box;
/* prevent any child from being wider than screen */
max-width: 100%;
}

body::before {
content: ‘’;
position: fixed; inset: 0;
background-image:
linear-gradient(rgba(79,142,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(79,142,255,0.03) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none; z-index: 0;
}
body::after {
content: ‘’;
position: fixed; inset: 0;
background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(79,142,255,0.07) 0%, transparent 65%);
pointer-events: none; z-index: 0;
}

/* ── PAGES ── */
.page {
position: relative; z-index: 1;
min-height: 100vh;
width: 100%;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
padding: 80px 20px 40px; /* top padding for nav */
animation: fadeUp .45s ease both;
overflow: hidden; /* no child can bleed out */
}
.page.hidden { display: none !important; }

@keyframes fadeUp {
from { opacity:0; transform:translateY(14px); }
to   { opacity:1; transform:none; }
}

/* ── NAV ── */
.nav {
position: fixed; top:0; left:0; right:0;
height: 54px;
display: flex; align-items: center;
padding: 0 24px;
z-index: 50;
border-bottom: 1px solid var(–border);
background: rgba(5,8,15,0.88);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
width: 100%; /* explicitly 100% not more */
}
.logo {
font-size: 18px; font-weight: 900; letter-spacing: -.02em;
background: linear-gradient(135deg, #fff 40%, var(–accent));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
background-clip: text;
}
.logo span { -webkit-text-fill-color: var(–accent); }

/* ── HERO ── */
.hero {
text-align: center;
width: 100%;
max-width: 560px;
margin-bottom: 32px;
padding: 0 4px;
}
.badge {
display: inline-flex; align-items: center; gap: 7px;
background: var(–accent-glow);
border: 1px solid rgba(79,142,255,.22);
border-radius: 40px; padding: 5px 14px;
font-size: 12px; font-family: ‘DM Mono’, monospace;
color: var(–accent); margin-bottom: 20px; letter-spacing: .04em;
white-space: nowrap;
}
.badge-dot {
width: 6px; height: 6px; border-radius: 50%;
background: var(–green); flex-shrink: 0;
animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

h1 {
font-size: clamp(36px, 9vw, 72px);
font-weight: 900; line-height: 1.0;
letter-spacing: -.03em; color: #fff; margin-bottom: 14px;
word-break: break-word;
}
h1 em {
font-style: normal;
background: linear-gradient(90deg, var(–accent), var(–green));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
background-clip: text;
}
.hero p {
font-size: 15px; color: var(–muted);
line-height: 1.6; padding: 0 8px;
}

/* ── CARD ── */
.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 20px;
padding: 28px 24px;
width: 100%;
max-width: 420px;
}
.card-title { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.card-sub {
font-size: 12px; color: var(–muted);
font-family: ‘DM Mono’, monospace; margin-bottom: 20px;
}

label {
display: block; font-size: 11px;
font-family: ‘DM Mono’, monospace;
letter-spacing: .1em; color: var(–muted);
text-transform: uppercase; margin-bottom: 7px;
}

input {
display: block;
width: 100%;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 11px; padding: 13px 14px;
color: var(–text);
font-family: ‘Cabinet Grotesk’, sans-serif;
font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
font-weight: 500;
outline: none;
transition: border-color .2s, box-shadow .2s;
margin-bottom: 14px;
-webkit-appearance: none;
appearance: none;
}
input:focus {
border-color: var(–accent);
box-shadow: 0 0 0 3px var(–accent-glow);
}
input::placeholder { color: var(–muted); font-weight: 400; }

.btn {
display: flex; align-items: center; justify-content: center; gap: 8px;
width: 100%; padding: 14px;
border-radius: 11px; border: none;
font-family: ‘Cabinet Grotesk’, sans-serif;
font-size: 15px; font-weight: 800;
cursor: pointer; transition: all .18s;
letter-spacing: -.01em;
-webkit-tap-highlight-color: transparent;
}
.btn-primary {
background: var(–accent); color: #fff;
box-shadow: 0 4px 20px rgba(79,142,255,.25);
}
.btn-primary:active { filter: brightness(.9); transform: scale(.98); }

/* ── JOIN PAGE ── */
.join-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 20px;
padding: 36px 24px;
width: 100%; max-width: 400px;
text-align: center;
}
.join-card .big-icon { font-size: 44px; margin-bottom: 12px; }
.join-card h2 {
font-size: 24px; font-weight: 900; color: #fff;
letter-spacing: -.02em; margin-bottom: 6px;
}
.join-card p {
font-size: 13px; color: var(–muted);
font-family: ‘DM Mono’, monospace; margin-bottom: 24px;
}

/* ── CALL PAGE ── */
#call-page {
position: fixed; inset: 0; z-index: 100;
background: #000;
display: flex; flex-direction: column;
width: 100%; height: 100%;
overflow: hidden;
}
#call-page.hidden { display: none !important; }

#jitsi-container {
flex: 1;
width: 100%;
min-height: 0;
overflow: hidden;
}
#jitsi-container iframe {
width: 100%; height: 100%;
border: none; display: block;
overflow: hidden;
}

/* Bottom bar — safe area aware for iPhone notch/home bar */
.call-bar {
background: rgba(5,8,15,.97);
border-top: 1px solid var(–border);
display: flex;
flex-wrap: wrap;
align-items: center;
gap: 8px;
padding: 10px 16px;
padding-bottom: calc(10px + env(safe-area-inset-bottom));
flex-shrink: 0;
width: 100%;
}

.bar-room-label {
font-family: ‘DM Mono’, monospace;
font-size: 11px; color: var(–muted);
white-space: nowrap;
}
.bar-room-label strong { color: var(–accent); font-weight: 400; }

.share-row {
display: flex; align-items: center;
gap: 6px; flex: 1;
min-width: 0; /* prevent flex overflow */
}

.share-link {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 7px;
padding: 6px 10px;
font-family: ‘DM Mono’, monospace;
font-size: 11px; color: var(–accent);
flex: 1; min-width: 0;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.sbtn {
padding: 7px 12px;
border-radius: 8px; border: none;
font-family: ‘Cabinet Grotesk’, sans-serif;
font-size: 12px; font-weight: 700;
cursor: pointer; white-space: nowrap;
flex-shrink: 0;
-webkit-tap-highlight-color: transparent;
}
.sbtn-copy { background: var(–accent); color: #fff; }
.sbtn-wa   { background: #25D366; color: #fff; }
.sbtn-end  { background: var(–red); color: #fff; margin-left: auto; }

/* ── TOAST ── */
#toast {
position: fixed; bottom: 90px; left: 50%;
transform: translateX(-50%) translateY(16px);
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 40px; padding: 9px 20px;
font-size: 13px; font-family: ‘DM Mono’, monospace;
color: var(–text); opacity: 0;
transition: all .35s cubic-bezier(.34,1.56,.64,1);
z-index: 999; pointer-events: none;
white-space: nowrap;
max-width: 90vw;
overflow: hidden; text-overflow: ellipsis;
}
#toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

/* ── LOADING ── */
#loading {
position: fixed; inset: 0; z-index: 200;
background: var(–bg);
display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 16px;
}
#loading.hidden { display: none; }
.spin {
width: 44px; height: 44px; border-radius: 50%;
border: 2px solid var(–border); border-top-color: var(–accent);
animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { font-family: ‘DM Mono’, monospace; font-size: 13px; color: var(–muted); }
</style>

</head>
<body>

<div id="toast"></div>

<div id="loading" class="hidden">
  <div class="spin"></div>
  <div class="load-text" id="load-text">Connecting…</div>
</div>

<nav class="nav"><div class="logo">wave<span>.</span></div></nav>

<!-- HOME -->

<div id="home-page" class="page">
  <div class="hero">
    <div class="badge"><span class="badge-dot"></span> free · no account · works everywhere</div>
    <h1>Video calls that<br><em>just work.</em></h1>
    <p>Create a call and share the link.<br>Anyone who taps it joins instantly.</p>
  </div>
  <div class="card">
    <div class="card-title">Start a new call</div>
    <div class="card-sub">// you'll get a shareable link</div>
    <label>Your name</label>
    <input type="text" id="host-name" placeholder="What should we call you?" maxlength="28" autocomplete="off" />
    <button class="btn btn-primary" onclick="createCall()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 10l4.553-2.275A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14"/><rect x="3" y="6" width="12" height="12" rx="2"/></svg>
      Create call &amp; get link
    </button>
  </div>
</div>

<!-- JOIN -->

<div id="join-page" class="page hidden">
  <div class="join-card">
    <div class="big-icon">👋</div>
    <h2>You're invited!</h2>
    <p id="join-sub">Someone is waiting in a call</p>
    <label>Your name</label>
    <input type="text" id="join-name" placeholder="Enter your name to join" maxlength="28" autocomplete="off" />
    <button class="btn btn-primary" onclick="joinCall()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 10l4.553-2.275A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14"/><rect x="3" y="6" width="12" height="12" rx="2"/></svg>
      Join call now
    </button>
  </div>
</div>

<!-- CALL -->

<div id="call-page" class="hidden">
  <div id="jitsi-container"></div>
  <div class="call-bar">
    <div class="bar-room-label">wave · <strong id="bar-room">—</strong></div>
    <div class="share-row" id="host-share-row" style="display:none">
      <div class="share-link" id="bar-link">—</div>
      <button class="sbtn sbtn-copy" onclick="copyLink()">Copy</button>
      <button class="sbtn sbtn-wa" onclick="shareWhatsApp()">WhatsApp</button>
    </div>
    <button class="sbtn sbtn-end" onclick="leaveCall()">Leave ✕</button>
  </div>
</div>

<script>
let roomId = '', myDisplayName = '', jitsiApi = null, isHost = false;

function genRoom() {
  const c = 'abcdefghijkmnpqrstuvwxyz23456789';
  let r = 'wave-';
  for (let i = 0; i < 10; i++) r += c[Math.floor(Math.random() * c.length)];
  return r;
}

function getRoomFromURL() {
  return new URLSearchParams(window.location.search).get('room') || '';
}

function shareURL() {
  return `${location.origin}${location.pathname}?room=${roomId}`;
}

let toastT;
function toast(msg, dur = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), dur);
}

function showPage(id) {
  ['home-page','join-page','call-page'].forEach(p =>
    document.getElementById(p)?.classList.add('hidden')
  );
  document.getElementById(id)?.classList.remove('hidden');
}

function setLoading(show, msg = 'Connecting…') {
  document.getElementById('load-text').textContent = msg;
  document.getElementById('loading').classList.toggle('hidden', !show);
}

function createCall() {
  myDisplayName = document.getElementById('host-name').value.trim() || 'Host';
  isHost = true;
  roomId = genRoom();
  history.replaceState(null, '', `?room=${roomId}`);
  launchJitsi();
}

function joinCall() {
  myDisplayName = document.getElementById('join-name').value.trim() || 'Guest';
  isHost = false;
  launchJitsi();
}

function launchJitsi() {
  setLoading(true, 'Connecting to call…');
  if (window.JitsiMeetExternalAPI) { startJitsi(); return; }
  const s = document.createElement('script');
  s.src = 'https://meet.jit.si/external_api.js';
  s.onload = startJitsi;
  s.onerror = () => { setLoading(false); toast('Network error — check connection'); };
  document.head.appendChild(s);
}

function startJitsi() {
  showPage('call-page');
  document.getElementById('bar-room').textContent = roomId.replace('wave-','');
  document.getElementById('bar-link').textContent = shareURL();
  if (isHost) document.getElementById('host-share-row').style.display = 'flex';

  jitsiApi = new JitsiMeetExternalAPI('meet.jit.si', {
    roomName: roomId,
    parentNode: document.getElementById('jitsi-container'),
    userInfo: { displayName: myDisplayName },
    configOverwrite: {
      startWithAudioMuted: false,
      startWithVideoMuted: false,
      prejoinPageEnabled: false,
      disableDeepLinking: true,
      enableWelcomePage: false,
      disableInviteFunctions: true,
      toolbarButtons: ['microphone','camera','desktop','chat','tileview','fullscreen','hangup'],
    },
    interfaceConfigOverwrite: {
      SHOW_JITSI_WATERMARK: false,
      SHOW_WATERMARK_FOR_GUESTS: false,
      SHOW_POWERED_BY: false,
      MOBILE_APP_PROMO: false,
      HIDE_INVITE_MORE_HEADER: true,
      TOOLBAR_ALWAYS_VISIBLE: true,
    },
    width: '100%',
    height: '100%',
  });

  jitsiApi.addEventListener('videoConferenceJoined', () => {
    setLoading(false);
    toast(isHost ? 'Call ready! Share the link below 🔗' : 'You joined the call 🎉', 5000);
  });
  jitsiApi.addEventListener('readyToClose', leaveCall);
}

function leaveCall() {
  try { jitsiApi?.dispose(); } catch(e){}
  jitsiApi = null;
  history.replaceState(null, '', location.pathname);
  location.reload();
}

function copyLink() {
  navigator.clipboard.writeText(shareURL())
    .then(() => toast('Link copied! 📋'))
    .catch(() => toast(shareURL()));
}

function shareWhatsApp() {
  window.open(`https://wa.me/?text=${encodeURIComponent('Join my video call 👇\n' + shareURL())}`);
}

window.addEventListener('DOMContentLoaded', () => {
  const room = getRoomFromURL();
  if (room) {
    roomId = room; isHost = false;
    showPage('join-page');
    setTimeout(() => document.getElementById('join-name').focus(), 350);
  } else {
    showPage('home-page');
    setTimeout(() => document.getElementById('host-name').focus(), 350);
  }
  document.getElementById('host-name').addEventListener('keydown', e => { if (e.key==='Enter') createCall(); });
  document.getElementById('join-name').addEventListener('keydown', e => { if (e.key==='Enter') joinCall(); });
});
</script>

</body>
</html>
